# ── Deploy de produção — build + up remoto via SSH ──────────────────────────
# Ao dar push na main (ou disparo manual), conecta no host Hetzner por SSH,
# atualiza o código e recria a stack com docker compose. As imagens são
# construídas no próprio host (build multi-stage dos Dockerfiles).
#
# Secrets necessários no repositório (Settings → Secrets and variables → Actions):
#   SSH_HOST        IP ou hostname do servidor (ex.: 203.0.113.10)
#   SSH_USER        usuário de deploy (ex.: deploy)
#   SSH_KEY         chave privada SSH (conteúdo do id_ed25519) do usuário acima
#   SSH_PORT        porta SSH (opcional, default 22)
#   DEPLOY_PATH     caminho do repo no servidor (ex.: /opt/codinhos)
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --all --prune
            git checkout main
            git reset --hard origin/main
            # Recria a stack (migrations rodam no serviço one-shot antes da api).
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
            # Limpa imagens/camadas órfãs para não encher o disco.
            docker image prune -f
            docker compose -f docker-compose.prod.yml ps
