server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: qualquer rota cai no index.html (client-side routing do react-router)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache agressivo para assets com hash no nome
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
